<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santita - Inspiração e Propósito</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
}

/* TOPO COM LOGO COMO FUNDO */
header {
  background: #1f3c68;
  background-image: url('imagens/logo.png');
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  color: white;
  text-align: center;
  padding: 100px 20px;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
}

/* BOTÃO */
.btn {
  background: #ffc107;
  color: #000;
  padding: 15px 25px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  display: inline-block;
  margin-top: 20px;
}

.btn:hover {
  background: #e0a800;
}

/* SEÇÕES */
section {
  padding: 50px 20px;
  text-align: center;
}

/* BENEFÍCIOS */
.benefits {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #f4f4f4;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}

/* BANNER */
.banner {
  background: #1f3c68;
  color: white;
  padding: 60px 20px;
}

/* RODAPÉ */
footer {
  background: #1f3c68;
  color: white;
  padding: 20px;
}
</style>

</head>
<body>

<header>
  <h1>Encontre seu Propósito</h1>
  <p>Testemunho • Inspiração • Vida com Deus</p>
  <a href="#" class="btn">Quero participar</a>
</header>
